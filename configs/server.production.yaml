# Production server config for gr.batmat.ir
# Generated by daxson deployment process.
#
# Used by: daxson serve --config /etc/daxson/server.yaml
# Or:      daxsond --config /etc/daxson/server.yaml  (PSK-only, no device auth)
#
# Key paths (when running as user 'daxson'):
#   identity_key defaults to ~/.daxson/server-identity.json  (auto-generated on first run)
#   registry     defaults to ~/.daxson/registry.json         (created on first invite)
#
# To use explicit paths (e.g. /var/lib/daxson/), uncomment and set:
#   identity_key: /var/lib/daxson/server-identity.json
#   registry: /var/lib/daxson/registry.json

mode: server

server:
  listen: ":443"

  tls:
    cert: /etc/letsencrypt/live/gr.batmat.ir/fullchain.pem
    key:  /etc/letsencrypt/live/gr.batmat.ir/privkey.pem
    next_protos:
      - h2
      - http/1.1

  auth:
    # PSK is ONLY used for relay-to-relay connections (e.g. an Iran-side relay
    # forwarding to this server). It is NOT used by device clients.
    # Generate with: openssl rand -hex 32
    psk: "REPLACE_WITH_OPENSSL_RAND_HEX_32"

  # identity_key: ~/.daxson/server-identity.json   # Auto-generated on first daxson serve
  # registry: ~/.daxson/registry.json               # Created when first invite is generated

  # Forward unauthenticated TCP connections (probers, scanners) to nginx.
  # nginx serves real HTML at 127.0.0.1:8080 so the server appears to be
  # a normal HTTPS web server to any external probe or scanner.
  probe_upstream: "127.0.0.1:8080"

  dashboard:
    # Management dashboard — bind to localhost only; access via SSH tunnel.
    # ssh -L 9443:127.0.0.1:9443 root@gr.batmat.ir
    # Then open http://localhost:9443 in your browser.
    listen: "127.0.0.1:9443"
    enabled: true

tunnel:
  transport:
    obfs:
      enabled: true
      # "browser" mimics real browser traffic patterns (burst size, keepalive, jitter).
      # Other options: grpc, video, mobile, relay
      personality: browser
    mux:
      max_streams: 512
      max_frame_size: 32768
      receive_buffer: 4194304   # 4 MB

metrics:
  # Prometheus-format metrics. Bind to localhost; never expose publicly.
  # Access via: ssh -L 9090:127.0.0.1:9090 root@gr.batmat.ir
  # Or: curl http://127.0.0.1:9090/metrics
  listen: "127.0.0.1:9090"

logging:
  level: info     # Change to 'debug' for verbose output during testing
  format: json    # Use 'console' for human-readable output

# pprof: uncomment only for profiling sessions; never leave enabled in production
# pprof:
#   listen: "127.0.0.1:6060"
